        Weather API</h1>
        <div class="search">
            <input type="text" placeholder="Enter city" id="city">
            <button id="searchBtn">Search</button>
        </div>
        <div id="weather"></div>
     </div>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

.head{
    font-size: 60px;
}


body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow-x:hidden;
    color:#fff;

    background:
    radial-gradient(circle at top left,#ff9a9e 0%,transparent 35%),
    radial-gradient(circle at top right,#89f7fe 0%,transparent 35%),
    radial-gradient(circle at bottom left,#a18cd1 0%,transparent 40%),
    radial-gradient(circle at bottom right,#fad0c4 0%,transparent 40%),
    linear-gradient(135deg,#0f172a,#172554,#1e293b);

    background-size:250% 250%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.search{
    display:flex;
    gap:12px;
}

.search input{
    flex:1;
    margin-top: 30px;
    padding:16px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:white;
    font-size:16px;
}

.search input::placeholder{
    color:#d1d5db;
}

.search input:focus{
    border-color:#38bdf8;
}

.search button{
    height: 60px;
    margin-top: 30px;
    padding:16px 22px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.search button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,0,0,.25);
}


.card{
    display: flex;
    justify-self: center;
    margin-top:25px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    animation:fade .5s ease;
}  

.carding{
    display: flex;
    justify-self: center;
}


@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.card h2{
    text-align:center;
    font-size:30px;
    margin-bottom:10px;
}

.card img{
    width:80px;
    height: 80px;
}

.card h1{
    text-align:center;
    font-size:70px;
    margin:5px 0;
}

.condition{
    text-align:center;
    font-size:20px;
    color:#dbeafe;
    margin-bottom:30px;
}

.weather-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
}

.box{
    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    border-radius:20px;

    padding:18px;

    transition:.3s;

    position:relative;

    overflow:hidden;
}


.box::before{
    content:"";
    position:absolute;
    inset:0;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.15),
        transparent
    );

    opacity:0;

    transition:.3s;
}
.box:hover::before{
    opacity:1;
}

.box:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 30px rgba(0,0,0,.25);
}

.box span{
    display:block;
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:10px;
}

.box h4{
    font-size:24px;
    font-weight:600;
}

#weather h2{
    text-align:center;
}

@media(max-width:600px){

.container{
padding:20px;
}

.search{
flex-direction:row;
}

.search button{
width:100%;
}

.weather-grid{
grid-template-rows:1fr;
}

.card h1{
font-size:55px;
}

.card h2{
font-size:26px;
}

}


</style>
</body>


<script>
    const API_KEY = "4d37efc723769f8099492d025ab753dd"
    const city = document.getElementById("city")
    const searchBtn = document.getElementById("searchBtn")
    const weather = document.getElementById("weather")



    async function getWeather() {
        const cityName = city.value.trim()
        if (cityName=="")return
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API_KEY}&units=metric`
        )
        const data = await response.json()
        console.log(data)
        if(data.cod=="404"){
            weather.innerHTML="<h2>City Not Found <h2/>"
                return
        }

        weather.innerHTML = `
    <div class="card">
 
    <div class = "carding">
    <h2>${data.name}</h2>
    <img src="https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png" alt="Weather Icon" class ="image">
    <div/>
    
    <div class = "cloud">
        <h1>${Math.round(data.main.temp)}°C</h1>
    <p class="condition">${data.weather[0].main}</p>
    <div/>

    <div class="weather-grid">

        <div class="box">
            <span>📅 Day</span>
            <h4>${new Date().toLocaleDateString("en-US",{weekday:"long"})}</h4>
        </div>

        <div class="box">
            <span>💧 Humidity</span>
            <h4>${data.main.humidity}%</h4>
        </div>

        <div class="box">
            <span>🌬 Wind</span>
            <h4>${data.wind.speed} m/s</h4>
        </div>

        <div class="box">
            <span>🥵 Feels Like</span>
            <h4>${Math.round(data.main.feels_like)}°C</h4>
        </div>

    </div>

</div>
`;
    }
    


    searchBtn.addEventListener("click", getWeather)
</script>
</html>
