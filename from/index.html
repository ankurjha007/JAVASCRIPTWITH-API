<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="container">

        <h2>Registration <span>Form</span></h2>

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Address</label>
        <input type="text" id="address" placeholder="Enter your address">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Contact Number</label>
        <input type="tel" id="contact" placeholder="Enter your contact number">

        <div class="btns">
            <button id="btn">Submit</button>
            <button onclick="displayData()">Display</button>
        </div>

    </div>

    <div class="card">

        <h2>User Details</h2>

        <div class="info">
            <p><strong>Name :</strong> <span id="dName"></span></p>
            <p><strong>Email :</strong> <span id="dEmail"></span></p>
            <p><strong>Phone :</strong> <span id="dPhone"></span></p>
            <p><strong>Address :</strong> <span id="dAddress"></span></p>
        </div>

    </div>

</div>

<script src="from.js"></script>

</body>
</html>
